<line x1="580" y1="170" x2="626" y2="170" class="dash" marker-end="url(#arrow)"/>
<line x1="514" y1="287" x2="580" y2="287" class="dash"/>
<line x1="580" y1="287" x2="580" y2="204" class="dash"/>

<rect class="teal-fill" x="36" y="388" width="150" height="52" rx="8" stroke-width="0.5"/>
<text class="th teal-th" x="111" y="412" text-anchor="middle">Columnar OLAP</text>
<text class="ts teal-ts" x="111" y="430" text-anchor="middle">the one new store</text>
<line x1="111" y1="316" x2="111" y2="382" class="arr" marker-end="url(#arrow)"/>

