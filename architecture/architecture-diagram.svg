<text class="ts gray-ts" x="275" y="300" text-anchor="middle">per-visitor · Redis</text>

<rect class="blue-fill" x="364" y="258" width="150" height="58" rx="8" stroke-width="0.5"/>
<text class="th blue-th" x="439" y="282" text-anchor="middle">Identity resolution</text>
<text class="ts blue-ts" x="439" y="300" text-anchor="middle">deterministic · reversible</text>

<line x1="460" y1="188" x2="120" y2="252" class="arr" marker-end="url(#arrow)"/>
<line x1="486" y1="188" x2="278" y2="252" class="arr" marker-end="url(#arrow)"/>
<line x1="512" y1="188" x2="442" y2="252" class="arr" marker-end="url(#arrow)"/>

