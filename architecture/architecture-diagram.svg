<svg width="100%" viewBox="0 0 680 700" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Real-time analytics pipeline architecture</title>
<desc>The existing JS SDK sends events to a stateless collector that acknowledges only after a durable commit; the collector appends to an immutable durable event log carrying two append-only logical streams: raw events and identity corrections. Three independent serving projections consume the log: an analytical projection writing to a new columnar OLAP store read by the customer dashboard; a decisioning projection writing per-visitor state to existing Redis read by render-path personalization; and an identity resolution service that consumes both streams during resolution and produces only new immutable identity-correction events, never mutating existing events. A separate warehouse export consumer feeds the customer's Snowflake or BigQuery. Existing Postgres holds OLTP metadata read by the identity service. Existing components are gray, the single new managed store is teal, the log spine is purple, external consumer actors are dashed.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
text{font-family:'Anthropic Sans','Helvetica Neue',Arial,sans-serif;}
.t{font-size:14px;fill:#3d3d3a;}
.ts{font-size:12px;fill:#73726c;}
.th{font-size:14px;font-weight:500;fill:#3d3d3a;}
.arr{stroke:#73726c;stroke-width:1.5;fill:none;}
.gray-fill{fill:#F1EFE8;stroke:#5F5E5A;}
.gray-th{font-weight:500;fill:#2C2C2A;}
.gray-ts{fill:#5F5E5A;}
.teal-fill{fill:#E1F5EE;stroke:#0F6E56;}
.teal-th{font-weight:500;fill:#085041;}
.teal-ts{fill:#0F6E56;}
.blue-fill{fill:#E6F1FB;stroke:#185FA5;}
.blue-th{font-weight:500;fill:#0C447C;}
.blue-ts{fill:#185FA5;}
.purple-fill{fill:#EEEDFE;stroke:#534AB7;}
.purple-th{font-weight:500;fill:#3C3489;}
.purple-ts{fill:#534AB7;}
.ext-fill{fill:#ffffff;stroke:#888780;}
.ext-th{font-weight:500;fill:#2C2C2A;}
.ext-ts{fill:#5F5E5A;}
.dash{stroke:#73726c;stroke-dasharray:4 3;fill:none;}
</style>
</defs>

