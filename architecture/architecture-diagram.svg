<text class="th gray-th" x="574" y="410" text-anchor="middle">Warehouse export</text>
<text class="ts gray-ts" x="574" y="428" text-anchor="middle">log consumer</text>
<line x1="620" y1="188" x2="590" y2="382" class="arr" marker-end="url(#arrow)"/>

<rect class="ext-fill" x="508" y="492" width="132" height="52" rx="8" stroke-width="1.2" stroke-dasharray="5 3"/>
