<rect class="teal-fill" x="130" y="20" width="13" height="13" rx="3" stroke-width="0.5"/>
<text class="ts" x="149" y="30">new store</text>
<rect class="purple-fill" x="238" y="20" width="13" height="13" rx="3" stroke-width="0.5"/>
<text class="ts" x="257" y="30">log spine</text>
<rect class="ext-fill" x="330" y="20" width="13" height="13" rx="3" stroke-width="1" stroke-dasharray="3 2"/>
<text class="ts" x="349" y="30">external actor</text>

<rect class="gray-fill" x="40" y="66" width="118" height="56" rx="8" stroke-width="0.5"/>
<text class="th gray-th" x="99" y="90" text-anchor="middle">JS SDK</text>
<text class="ts gray-ts" x="99" y="108" text-anchor="middle">existing, unchanged</text>

<rect class="blue-fill" x="200" y="62" width="148" height="64" rx="8" stroke-width="0.5"/>
<text class="th blue-th" x="274" y="86" text-anchor="middle">Collector</text>
<text class="ts blue-ts" x="274" y="104" text-anchor="middle">stateless · ack-after-durable</text>
<text class="ts blue-ts" x="274" y="119" text-anchor="middle">fail-closed</text>

<rect class="purple-fill" x="404" y="60" width="236" height="128" rx="12" stroke-width="0.5"/>
<text class="th purple-th" x="522" y="84" text-anchor="middle">Durable event log</text>
<text class="ts purple-ts" x="522" y="101" text-anchor="middle">source of truth · replayable · immutable</text>
<rect class="purple-fill" x="422" y="110" width="200" height="30" rx="6" stroke-width="0.5"/>
<text class="ts purple-ts" x="522" y="129" text-anchor="middle">stream 1: raw events</text>
<rect class="purple-fill" x="422" y="148" width="200" height="30" rx="6" stroke-width="0.5"/>
<text class="ts purple-ts" x="522" y="167" text-anchor="middle">stream 2: identity corrections</text>

<line x1="158" y1="94" x2="194" y2="94" class="arr" marker-end="url(#arrow)"/>
<line x1="348" y1="94" x2="398" y2="94" class="arr" marker-end="url(#arrow)"/>

<text class="ts" x="266" y="220" text-anchor="middle">three independent serving projections — isolated failure domains</text>

